# 攻撃目標設定
# JailbreakBench JBB-Behaviors (NeurIPS 2024)
# カテゴリ: HD, MH, PH, EH, FD, DI, SA, PD, EA, GD
goals:
  path: "experiments/c3a/goals.json"
  n_goals: 100  # 使用する目標数（null で全件）
  categories: null  # 全カテゴリを使用（特定カテゴリのみの場合はリストで指定）
  # categories:
  #   - MH   # Malware/Hacking
  #   - PH   # Physical harm
  #   - PD   # Privacy

# パス設定
paths:
  data: "data/processed/en_v2_results.csv"
  knowledge_base: "experiments/c3a/results/knowledge_base.json"  # Part 1 完了後に生成
  output_dir: "results/c3a/part2"  # 基底ディレクトリ
  # 以下は output_dir からの相対パス（自動生成）
  # experiments_dir: "{output_dir}/experiments"           # 実験結果（config/agent ごと）
  # index_file: "{output_dir}/experiments/index.json"    # 完了済み実験インデックス
  # aggregated_file: "{output_dir}/aggregated_results.json"  # 集約結果

# 出力ファイル構造（参考）
# {output_dir}/
# ├── experiments/
# │   ├── index.json                    # 完了済み実験のインデックス
# │   └── {config_name}/
# │       └── {agent_name}/
# │           ├── results.json          # 詳細結果（攻撃履歴付き）
# │           ├── summary.json          # goal サマリー（軽量版）
# │           ├── attack_log.csv        # 攻撃ログ（CSV）
# │           └── attack_log.json       # 攻撃ログ（JSON）
# └── aggregated_results.json           # 全結果の集約

# コスト制御
cost:
  confirm_before_run: true  # 実行前に確認
  max_budget_usd: 500       # 最大予算（超過時に警告）

# ログ設定
logging:
  level: "INFO"
  save_intermediate: true   # 中間結果を保存
  checkpoint_interval: 10   # チェックポイント間隔（goal 数）
